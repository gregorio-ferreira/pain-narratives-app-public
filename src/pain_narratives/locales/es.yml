questionnaires:
  header: "📋 Cuestionarios"
  description: |
    ℹ️ **Análisis de Cuestionarios**

    Esta función le permite ejecutar cuestionarios estandarizados usando la narrativa actual.
    
    **Cuestionarios Disponibles:**
    - **PCS (Escala de Catastrofización del Dolor)**: Evalúa patrones de pensamiento catastrófico relacionados con la experiencia del dolor
    - **BPI-IS (Inventario Breve del Dolor)**: Evalúa la interferencia del dolor con las actividades diarias y la intensidad del dolor
    - **TSK-11SV (Escala de Tampa de Kinesiofobia - Versión Corta)**: Mide el miedo al movimiento y la evitación de actividades debido al dolor
    
    **Cómo funciona:**
    1. Ingrese o seleccione una narrativa de dolor
    2. Elija un cuestionario del menú desplegable
    3. Haga clic en "Ejecutar Cuestionario" para obtener respuestas generadas por IA
    4. Vea puntuaciones detalladas y análisis
    
    El modelo de IA analizará la narrativa y proporcionará puntuaciones basadas en el marco validado del cuestionario.
  select_questionnaire: "Seleccionar cuestionario"
  select_questionnaires: "Seleccionar cuestionarios"
  select_at_least_one: "Seleccione al menos un cuestionario para ejecutar."
