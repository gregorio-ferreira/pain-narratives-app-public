  templates_description: |
    **Plantillas de Evaluación de Dolor Crónico Predeterminadas:**

    - **Rol del Sistema**: Define la IA como una persona experta en evaluación de los problemas de dolor
    - **Prompt Base**: Proporciona criterios de evaluación estructurados para puntuación de severidad y discapacidad (escala 0-10)
    - **Soporte de Idioma**: Optimizado para narrativas de pacientes en español con explicaciones en inglés
    - **Enfoque Clínico**: Incluye orientación sobre mecanismos de afrontamiento, factores de resistencia y evaluación holística

    Estas plantillas están basadas en mejores prácticas clínicas y pueden personalizarse después de la creación.
