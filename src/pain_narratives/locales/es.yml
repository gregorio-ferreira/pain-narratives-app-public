# Welcome page (landing page for non-authenticated users)
welcome:
  tagline: "Herramienta de Investigación Potenciada por IA para la Evaluación de Dimensiones de Dolor Crónico"
  description: |
    Una plataforma para profesionales de la salud e investigadores para ayudar en la evaluación del dolor
    de las narrativas propias de las personas. AI Narratives utiliza Modelos de Lenguaje Grande y ha sido optimizado
    para el idioma español. Construido con prácticas modernas de Python incluyendo SQLModel, gestión de paquetes UV,
    y gestión integral de usuarios para la excelencia en investigación.
  about_platform_title: "Acerca de Esta Plataforma"
  about_platform_description: |
    La Plataforma de Evaluación AINarratives es una herramienta de investigación especializada diseñada para profesionales
    de la salud e investigadores para analizar sistemáticamente las descripciones de dolor 
    utilizando inteligencia artificial con criterios de evaluación a nivel de psicólogo experto.
  key_capabilities_title: "Capacidades Clave:"
  capability_management: "⚙️ **Gestión**: Crear y gestionar grupos de evaluación para investigación organizada"
  capability_evaluation: "**Evaluación de resultados relevantes para evaluación de Dimensiones**: los expertos pueden elegir entre evaluaciones predefinidas o crear las suyas propias."
  capability_spanish: "**Optimizado para Idioma Español**: Diseñado específicamente para narrativas de pacientes de habla hispana"
